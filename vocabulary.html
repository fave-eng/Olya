  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--rose:#f43f5e;--orange:#fb923c;--amber:#f59e0b;--emerald:#10b981;--blue:#3b82f6;--indigo:#4f46e5;--bg:#f1f5f9;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--radius:16px;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:100px;}

    .hero{background:linear-gradient(135deg,#f43f5e 0%,#fb923c 50%,#f59e0b 100%);padding:40px 24px 100px;position:relative;}
    .hero-wave{position:absolute;bottom:-1px;left:0;right:0;line-height:0;pointer-events:none;}
    .hero-wave svg{display:block;width:100%;}
    .hero-back{display:inline-flex;align-items:center;gap:6px;color:rgba(255,255,255,0.75);font-size:13px;font-weight:600;text-decoration:none;margin-bottom:20px;transition:color 0.2s;}
    .hero-back:hover{color:#fff;}
    .hero h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:clamp(28px,5vw,42px);font-weight:800;color:#fff;letter-spacing:-0.5px;margin-bottom:8px;}
    .hero p{color:rgba(255,255,255,0.75);font-size:15px;}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);color:#fff;font-size:12px;font-weight:600;padding:5px 14px;border-radius:100px;margin-bottom:16px;}
    .hero-stats{display:flex;gap:24px;margin-top:16px;}
    .hs-item{color:rgba(255,255,255,0.9);font-size:13px;}
    .hs-item strong{display:block;font-family:'Plus Jakarta Sans',sans-serif;font-size:24px;font-weight:800;color:#fff;}

    .page{max-width:700px;margin:0 auto;padding:24px 20px 0;}
    .section-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:28px 0 14px;}

    /* TOPIC GRID */
    .topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
    .topic-card{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);padding:18px;cursor:pointer;transition:all 0.2s;}
    .topic-card:hover{border-color:var(--rose);box-shadow:0 6px 20px rgba(244,63,94,0.1);transform:translateY(-2px);}
    .tc-icon{font-size:28px;margin-bottom:8px;}
    .tc-name{font-family:'Plus Jakarta Sans',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px;}
    .tc-count{font-size:12px;color:var(--muted);margin-bottom:8px;}
    .tc-bar-bg{height:5px;background:#f1f5f9;border-radius:100px;overflow:hidden;}
    .tc-bar-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,var(--rose),var(--orange));transition:width 0.5s;}
    .tc-pct{font-size:11px;font-weight:700;color:var(--rose);margin-top:4px;}

    /* DETAIL VIEW */
    .detail-view{display:none;}
    .detail-view.show{display:block;}
    .back-btn-detail{display:inline-flex;align-items:center;gap:6px;color:var(--rose);font-size:13px;font-weight:700;cursor:pointer;margin-bottom:20px;text-decoration:none;border:none;background:none;padding:0;}

    /* TABS */
    .tabs{display:flex;gap:4px;background:#f1f5f9;border-radius:12px;padding:4px;margin-bottom:20px;}
    .tab-btn{flex:1;padding:9px;border:none;background:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);transition:all 0.2s;}
    .tab-btn.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
    .tab-content{display:none;}
    .tab-content.active{display:block;}

    /* FLASHCARD */
    .flashcard-wrap{perspective:800px;height:200px;cursor:pointer;margin-bottom:20px;}
    .flashcard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s;}
    .flashcard.flipped{transform:rotateY(180deg);}
    .card-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--radius);border:1.5px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
    .card-front{background:linear-gradient(135deg,#fff 0%,#fff8f8 100%);}
    .card-back{background:linear-gradient(135deg,#f0fdf4 0%,#fff 100%);transform:rotateY(180deg);}
    .card-word{font-family:'Plus Jakarta Sans',sans-serif;font-size:28px;font-weight:800;color:var(--text);margin-bottom:8px;}
    .card-hint{font-size:13px;color:var(--muted);}
    .card-translation{font-family:'Plus Jakarta Sans',sans-serif;font-size:22px;font-weight:700;color:var(--emerald);margin-bottom:6px;}
    .card-example{font-size:12px;color:var(--muted);font-style:italic;line-height:1.5;}
    .card-tap{font-size:11px;color:var(--muted);margin-top:8px;}

    .fc-counter{text-align:center;font-size:13px;color:var(--muted);margin-bottom:12px;}
    .fc-buttons{display:flex;gap:10px;}
    .fc-btn{flex:1;padding:12px;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all 0.15s;}
    .fc-btn:active{transform:scale(0.97);}
    .fc-btn.know{background:#d1fae5;color:#065f46;}
    .fc-btn.know:hover{background:#a7f3d0;}
    .fc-btn.hard{background:#fce7f3;color:#9d174d;}
    .fc-btn.hard:hover{background:#fbcfe8;}
    .fc-done{text-align:center;padding:30px;background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);}
    .fc-done-emoji{font-size:40px;margin-bottom:8px;}
    .fc-done-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:800;margin-bottom:4px;}
    .fc-done-sub{font-size:13px;color:var(--muted);margin-bottom:16px;}
    .restart-btn{background:var(--rose);color:#fff;border:none;border-radius:10px;padding:10px 24px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;}

    /* TEST */
    .test-q{background:var(--card);border-radius:var(--radius);border:1.5px solid var(--border);padding:20px;margin-bottom:16px;}
    .test-q-text{font-family:'Plus Jakarta Sans',sans-serif;font-size:18px;font-weight:700;margin-bottom:14px;text-align:center;}
    .test-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .test-opt{padding:12px;border-radius:10px;border:1.5px solid var(--border);cursor:pointer;font-size:14px;font-weight:600;text-align:center;transition:all 0.15s;}
    .test-opt:hover{border-color:var(--rose);}
    .test-opt.correct{border-color:var(--emerald);background:#f0fdf4;color:#065f46;pointer-events:none;}
    .test-opt.wrong{border-color:#ef4444;background:#fef2f2;color:#991b1b;pointer-events:none;}
    .test-opt.reveal{border-color:var(--emerald);background:#f0fdf4;pointer-events:none;}
    .test-progress-wrap{height:5px;background:#f1f5f9;border-radius:100px;overflow:hidden;margin-bottom:16px;}
    .test-progress-fill{height:100%;background:linear-gradient(90deg,var(--rose),var(--orange));border-radius:100px;transition:width 0.4s;}
    .test-done{text-align:center;padding:30px;}
    .test-done-score{font-family:'Plus Jakarta Sans',sans-serif;font-size:40px;font-weight:800;color:var(--rose);margin-bottom:6px;}

    /* ALL WORDS */
    .words-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .word-chip{padding:10px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--card);transition:all 0.2s;}
    .word-chip.known{border-color:var(--emerald);background:#f0fdf4;}
    .word-chip-en{font-size:14px;font-weight:600;}
    .word-chip-ru{font-size:12px;color:var(--muted);margin-top:2px;}
    .word-chip.known .word-chip-en{color:#065f46;}

    .nav-pill{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0f172a;border-radius:100px;padding:12px 24px;display:flex;gap:4px;box-shadow:0 8px 32px rgba(15,23,42,0.3);z-index:900;white-space:nowrap;}
    .nav-pill a{color:rgba(255,255,255,0.6);font-size:12px;font-weight:600;text-decoration:none;padding:6px 14px;border-radius:100px;transition:all 0.2s;}
    .nav-pill a:hover,.nav-pill a.active{background:var(--rose);color:#fff;}
  </style>
</head>

// State
let knownState={};
let currentSetId=null;
let fcIndex=0;
let fcWords=[];
let testWords=[];
let testIndex=0;
let testResults={};

function lsKey(setId){return 'olya_vocab_'+setId;}

function loadKnown(setId){
  try{return JSON.parse(localStorage.getItem(lsKey(setId)))||{};}catch(e){return{};}
}
function saveKnown(setId,state){
  localStorage.setItem(lsKey(setId),JSON.stringify(state));
}
function upsertSupabase(setId,wordIdx,known){
  fetch(SUPABASE_URL+'vocab_progress',{
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
    body:JSON.stringify({student_id:STUDENT_ID,set_id:setId,word_idx:wordIdx,known,updated_at:new Date().toISOString()})
  }).catch(()=>{});
}

function countKnown(setId){
  const st=loadKnown(setId);
  return Object.values(st).filter(Boolean).length;
}
function totalKnownAll(){
  let k=0,t=0;
  VOCAB_SETS.forEach(s=>{k+=countKnown(s.id);t+=s.words.length;});
  return{k,t};
}

function renderTopicGrid(){
  const grid=document.getElementById('topicGrid');
  const{k,t}=totalKnownAll();
  document.getElementById('heroKnown').textContent=k;
  document.getElementById('heroTotal').textContent=t;
  document.getElementById('heroPct').textContent=t?Math.round(k/t*100)+'%':'0%';
  grid.innerHTML=VOCAB_SETS.map(s=>{
    const kn=countKnown(s.id);
    const pct=Math.round(kn/s.words.length*100);
    return `<div class="topic-card" onclick="openSet('${s.id}')">
      <div class="tc-icon">${s.icon}</div>
      <div class="tc-name">${s.name}</div>
      <div class="tc-count">${kn} / ${s.words.length} слов</div>
      <div class="tc-bar-bg"><div class="tc-bar-fill" style="width:${pct}%"></div></div>
      <div class="tc-pct">${pct}%</div>
    </div>`;
  }).join('');
}

function openSet(setId){
  currentSetId=setId;
  knownState=loadKnown(setId);
  const set=VOCAB_SETS.find(s=>s.id===setId);
  document.getElementById('detailTitle').textContent=set.icon+' '+set.name;
  document.getElementById('detailSub').textContent=set.words.length+' слов · нажми на карточку чтобы перевернуть';
  document.getElementById('mainView').style.display='none';
  document.getElementById('detailView').className='detail-view show';
  switchTab('cards');
}
function showMain(){
  document.getElementById('mainView').style.display='';
  document.getElementById('detailView').className='detail-view';
  renderTopicGrid();
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.className='tab-btn'+((['cards','test','all'][i]===tab)?' active':'');
  });
  ['cards','test','all'].forEach(t=>{
    document.getElementById('tab-'+t).className='tab-content'+(t===tab?' active':'');
  });
  if(tab==='cards')renderCards();
  else if(tab==='test')renderTest();
  else if(tab==='all')renderAllWords();
}

// ─── FLASHCARDS ───
function renderCards(){
  const set=VOCAB_SETS.find(s=>s.id===currentSetId);
  fcWords=[...set.words];
  fcIndex=0;
  showCard();
}
function showCard(){
  const cont=document.getElementById('tab-cards');
  if(fcIndex>=fcWords.length){
    cont.innerHTML=`<div class="fc-done"><div class="fc-done-emoji">🎉</div><div class="fc-done-title">Все карточки пройдены!</div><div class="fc-done-sub">${Object.values(knownState).filter(Boolean).length} из ${fcWords.length} отмечено как "Знаю"</div><button class="restart-btn" onclick="fcIndex=0;showCard()">🔄 Пройти снова</button></div>`;
    return;
  }
  const w=fcWords[fcIndex];
  cont.innerHTML=`
    <div class="fc-counter">${fcIndex+1} / ${fcWords.length}</div>
    <div class="flashcard-wrap" onclick="this.querySelector('.flashcard').classList.toggle('flipped')">
      <div class="flashcard">
        <div class="card-face card-front">
          <div class="card-word">${w.en}</div>
          <div class="card-hint">часть речи / контекст</div>
          <div class="card-tap">👆 нажми чтобы увидеть перевод</div>
        </div>
        <div class="card-face card-back">
          <div class="card-translation">${w.ru}</div>
          <div class="card-example">"${w.ex}"</div>
        </div>
      </div>
    </div>
    <div class="fc-buttons">
      <button class="fc-btn hard" onclick="markWord(${fcIndex},false)">😅 Трудно</button>
      <button class="fc-btn know" onclick="markWord(${fcIndex},true)">✅ Знаю!</button>
    </div>`;
}
function markWord(idx,known){
  const w=fcWords[idx];
  const wordIdx=VOCAB_SETS.find(s=>s.id===currentSetId).words.indexOf(w);
  knownState[wordIdx]=known;
  saveKnown(currentSetId,knownState);
  upsertSupabase(currentSetId,wordIdx,known);
  fcIndex++;
  showCard();
}

// ─── TEST ───
function renderTest(){
  const set=VOCAB_SETS.find(s=>s.id===currentSetId);
  testWords=shuffle([...set.words]);
  testIndex=0;
  testResults={};
  showTestQ();
}
function showTestQ(){
  const cont=document.getElementById('tab-test');
  if(testIndex>=testWords.length){
    const correct=Object.values(testResults).filter(Boolean).length;
    const pct=Math.round(correct/testWords.length*100);

    // batch upsert after test
    const set=VOCAB_SETS.find(s=>s.id===currentSetId);
    set.words.forEach((w,i)=>{
      const inTest=testWords.findIndex(tw=>tw.en===w.en);
      if(inTest>=0){
        const known=testResults[inTest]===true;
        knownState[i]=known;
        upsertSupabase(currentSetId,i,known);
      }
    });
    saveKnown(currentSetId,knownState);

    cont.innerHTML=`<div class="test-done"><div class="test-done-score">${correct}/${testWords.length}</div><div style="font-size:15px;color:var(--muted);margin-bottom:16px;">${pct>=80?'🎉 Отличный результат!':pct>=50?'👍 Неплохо, продолжай!':'💪 Повтори карточки и попробуй снова'}</div><button class="restart-btn" onclick="renderTest()">🔄 Пройти снова</button></div>`;
    renderTopicGrid();
    return;
  }
  const w=testWords[testIndex];
  const set=VOCAB_SETS.find(s=>s.id===currentSetId);
  const others=shuffle(set.words.filter(x=>x.en!==w.en)).slice(0,3);
  const opts=shuffle([w,...others]);
  const pct=Math.round(testIndex/testWords.length*100);
  cont.innerHTML=`
    <div class="test-progress-wrap"><div class="test-progress-fill" style="width:${pct}%"></div></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:12px;text-align:right;">${testIndex+1} / ${testWords.length}</div>
    <div class="test-q">
      <div class="test-q-text">${w.en}</div>
      <div class="test-opts">${opts.map(o=>`<div class="test-opt" onclick="answerTest(this,'${o.en}','${w.en}',${testIndex})">${o.ru}</div>`).join('')}</div>
    </div>`;
}
function answerTest(el,chosen,correct,idx){
  if(el.parentNode.querySelector('.correct'))return;
  const isOk=chosen===correct;
  testResults[idx]=isOk;
  el.classList.add(isOk?'correct':'wrong');
  if(!isOk){
    [...el.parentNode.children].forEach(c=>{
      if(c.onclick&&c.onclick.toString().includes("'"+correct+"'")||c.textContent===VOCAB_SETS.find(s=>s.id===currentSetId).words.find(w=>w.en===correct)?.ru){
        c.classList.add('reveal');
      }
    });
  }
  setTimeout(()=>{testIndex++;showTestQ();},isOk?600:1200);
}

// ─── ALL WORDS ───
function renderAllWords(){
  const set=VOCAB_SETS.find(s=>s.id===currentSetId);
  document.getElementById('tab-all').innerHTML=`<div class="words-grid">${set.words.map((w,i)=>`<div class="word-chip${knownState[i]?' known':''}"><div class="word-chip-en">${w.en}${knownState[i]?' ✓':''}</div><div class="word-chip-ru">${w.ru}</div></div>`).join('')}</div>`;
}

function shuffle(arr){return arr.sort(()=>Math.random()-0.5);}

// ─── SUPABASE SYNC ───
async function syncFromSupabase(){
  try{
    const r=await fetch(SUPABASE_URL+'vocab_progress?student_id=eq.'+STUDENT_ID+'&select=set_id,word_idx,known',{headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}});
    if(!r.ok)return;
    const rows=await r.json();
    const grouped={};
    rows.forEach(row=>{
      if(!grouped[row.set_id])grouped[row.set_id]={};
      grouped[row.set_id][row.word_idx]=row.known;
    });
    Object.entries(grouped).forEach(([setId,state])=>{
      const local=loadKnown(setId);
      const merged=Object.assign({},local,state);
      saveKnown(setId,merged);
    });
    renderTopicGrid();
  }catch(e){}
}

renderTopicGrid();
syncFromSupabase();
</script>
