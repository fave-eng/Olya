<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Словарь — Olya's English Space</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rose: #f43f5e; --orange: #fb923c; --amber: #f59e0b;
      --emerald: #10b981; --blue: #3b82f6;
      --bg: #f1f5f9; --card: #fff; --text: #0f172a;
      --muted: #64748b; --border: #e2e8f0;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

    /* HERO */
    .hero { background: linear-gradient(135deg, #f43f5e 0%, #fb923c 50%, #f59e0b 100%); padding: 40px 24px 80px; position: relative; }
    .hero-wave { position: absolute; bottom: -1px; left: 0; right: 0; line-height: 0; pointer-events: none; }
    .hero-wave svg { display: block; width: 100%; }
    .hero-back { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.8); font-size: 13px; font-weight: 600; text-decoration: none; margin-bottom: 20px; transition: color 0.2s; }
    .hero-back:hover { color: #fff; }
    .hero-badge { display: inline-flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.3); color: #fff; font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 100px; margin-bottom: 16px; }
    .hero h1 { font-family: 'Plus Jakarta Sans', sans-serif; font-size: clamp(28px,5vw,40px); font-weight: 800; color: #fff; letter-spacing: -0.5px; margin-bottom: 6px; }
    .hero p  { color: rgba(255,255,255,0.8); font-size: 15px; }
    .hero-stats { display: flex; gap: 28px; margin-top: 18px; }
    .hs { color: rgba(255,255,255,0.85); font-size: 13px; }
    .hs strong { display: block; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 28px; font-weight: 800; color: #fff; line-height: 1; }

    /* PAGE */
    .page { max-width: 700px; margin: 0 auto; padding: 0 20px; }

    /* STATS */
    .stats-row { display: flex; gap: 12px; margin-top: 24px; margin-bottom: 28px; }
    .stat-chip { background: var(--card); border-radius: 16px; border: 1.5px solid var(--border); padding: 16px 20px; flex: 1; text-align: center; box-shadow: 0 4px 14px rgba(0,0,0,0.07); }
    .sc-num { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 26px; font-weight: 800; }
    .sc-lbl { font-size: 11px; color: var(--muted); font-weight: 600; margin-top: 2px; }
    .sc-known .sc-num { color: var(--emerald); }
    .sc-total .sc-num { color: var(--orange); }
    .sc-pct   .sc-num { color: var(--rose); }

    /* TABS */
    .tabs-wrap { background: var(--card); border-radius: 16px; border: 1.5px solid var(--border); overflow: hidden; margin-bottom: 20px; }
    .tabs { display: flex; padding: 6px; gap: 4px; border-bottom: 1px solid var(--border); }
    .tab-btn { flex: 1; padding: 10px; border: none; background: none; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted); transition: all 0.2s; font-family: 'Inter', sans-serif; }
    .tab-btn.active { background: linear-gradient(135deg, var(--rose), var(--orange)); color: #fff; }
    .tab-pane { display: none; padding: 20px; }
    .tab-pane.active { display: block; }

    /* DICTIONARY TABLE */
    .dict-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .dict-table th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); border-bottom: 1px solid var(--border); }
    .dict-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .dict-table tr:last-child td { border-bottom: none; }
    .dict-table .en-word { font-weight: 700; font-size: 15px; }
    .dict-table .ru-word { color: var(--muted); }
    .known-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); display: inline-block; }
    .known-dot.known { background: var(--emerald); }

    /* FLASHCARDS */
    .fc-counter { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .flashcard-wrap { perspective: 800px; height: 200px; cursor: pointer; margin-bottom: 18px; }
    .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.45s; }
    .flashcard.flipped { transform: rotateY(180deg); }
    .card-face {
      position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
      border-radius: 18px; border: 1.5px solid var(--border);
      display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center;
    }
    .card-front { background: linear-gradient(135deg, #fff, #fff8f8); }
    .card-back  { background: linear-gradient(135deg, #f0fdf4, #fff); transform: rotateY(180deg); }
    .card-word  { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 30px; font-weight: 800; margin-bottom: 8px; color: var(--text); }
    .card-tap   { font-size: 12px; color: var(--muted); }
    .card-trans { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 22px; font-weight: 700; color: var(--emerald); margin-bottom: 6px; }
    .fc-btns { display: flex; gap: 10px; }
    .fc-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.15s; }
    .fc-btn.know { background: #d1fae5; color: #065f46; }
    .fc-btn.know:hover { background: #a7f3d0; }
    .fc-btn.hard { background: #fce7f3; color: #9d174d; }
    .fc-btn.hard:hover { background: #fbcfe8; }
    .fc-done { text-align: center; padding: 30px; }
    .fc-done-emoji { font-size: 40px; margin-bottom: 8px; }
    .fc-done-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 6px; }
    .fc-done-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }

    /* QUIZ */
    .quiz-counter { font-size: 12px; color: var(--muted); text-align: right; margin-bottom: 10px; }
    .quiz-pb-bg { height: 5px; background: var(--bg); border-radius: 100px; overflow: hidden; margin-bottom: 16px; }
    .quiz-pb-fill { height: 100%; background: linear-gradient(90deg, var(--rose), var(--orange)); border-radius: 100px; transition: width 0.4s; }
    .quiz-word-display { text-align: center; margin-bottom: 16px; }
    .quiz-word { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 30px; font-weight: 800; margin-bottom: 4px; }
    .quiz-input-row { text-align: center; margin-bottom: 10px; }
    .quiz-input { padding: 12px 16px; width: 100%; max-width: 360px; font-size: 16px; border: 2px solid var(--border); border-radius: 12px; font-family: 'Inter', sans-serif; text-align: center; transition: border-color 0.2s; }
    .quiz-input:focus { outline: none; border-color: var(--rose); }
    .quiz-result { text-align: center; font-size: 15px; font-weight: 700; min-height: 22px; margin-bottom: 12px; }
    .quiz-result.ok  { color: var(--emerald); }
    .quiz-result.err { color: #ef4444; }
    .quiz-score { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 14px; }
    .quiz-btn-row { display: flex; justify-content: center; gap: 10px; }
    .quiz-btn { padding: 10px 22px; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; }
    .quiz-btn.primary { background: linear-gradient(135deg, var(--rose), var(--orange)); color: #fff; }
    .quiz-btn.secondary { background: var(--bg); color: var(--text); border: 1.5px solid var(--border); }
    .quiz-done { text-align: center; padding: 20px; }
    .quiz-done-score { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 40px; font-weight: 800; color: var(--rose); margin-bottom: 6px; }
    .quiz-done-msg { font-size: 14px; color: var(--muted); margin-bottom: 18px; }

    .btn { display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, var(--rose), var(--orange)); color: #fff; border: none; border-radius: 12px; padding: 10px 24px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif; }

    @media (max-width: 500px) {
      .stats-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="page" style="position:relative;z-index:1">
    <a href="index.html" class="hero-back">← На главную</a>
    <div class="hero-badge">💥 Vocabulary</div>
    <h1>Слова урока</h1>
    <p>Unit 2A — 17 слов · карточки · тест · прогресс</p>
    <div class="hero-stats">
      <div class="hs"><strong id="heroKnown">0</strong>Знаю</div>
      <div class="hs"><strong>17</strong>Всего</div>
      <div class="hs"><strong id="heroPct">0%</strong>Прогресс</div>
    </div>
  </div>
  <div class="hero-wave">
    <svg viewBox="0 0 1440 56" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
      <path d="M0,56 C360,0 1080,0 1440,56 L1440,56 L0,56 Z" fill="#f1f5f9"/>
    </svg>
  </div>
</div>

<div class="page">

  <div class="stats-row">
    <div class="stat-chip sc-known"><div class="sc-num" id="statKnown">0</div><div class="sc-lbl">Знаю</div></div>
    <div class="stat-chip sc-total"><div class="sc-num">17</div><div class="sc-lbl">Всего слов</div></div>
    <div class="stat-chip sc-pct"><div class="sc-num" id="statPct">0%</div><div class="sc-lbl">Прогресс</div></div>
  </div>

  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('dict')">📋 Словарь</button>
      <button class="tab-btn" onclick="switchTab('cards')">🃏 Карточки</button>
      <button class="tab-btn" onclick="switchTab('quiz')">🎯 Тест</button>
    </div>

    <!-- DICTIONARY -->
    <div class="tab-pane active" id="tab-dict">
      <table class="dict-table">
        <thead><tr><th></th><th>English</th><th>Русский</th></tr></thead>
        <tbody id="dictBody"></tbody>
      </table>
    </div>

    <!-- FLASHCARDS -->
    <div class="tab-pane" id="tab-cards">
      <div id="fcContent"></div>
    </div>

    <!-- QUIZ -->
    <div class="tab-pane" id="tab-quiz">
      <div id="quizContent"></div>
    </div>

  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const SB_URL = 'https://echffgdxkcxvobrwwiyw.supabase.co/rest/v1';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjaGZmZ2R4a2N4dm9icnd3aXl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4NDE0MTQsImV4cCI6MjA5NzQxNzQxNH0.MCcX7JTBZfqBCzcmLiqfxLqmzE_3mo5WuQmrmpf1qKU';
const STUDENT = 'olya';
const LS_KEY  = 'olya_vocab_known';

// ─── WORDS ────────────────────────────────────────────────────────────────────
const WORDS = [
  { en: 'title',       ru: ['название', 'заголовок'] },
  { en: 'lost',        ru: ['потерял', 'потерянный', 'потерялся'] },
  { en: 'last',        ru: ['последний', 'прошлый'] },
  { en: 'climb',       ru: ['взбираться', 'подниматься'] },
  { en: 'table',       ru: ['стол'] },
  { en: 'top',         ru: ['верх', 'вершина'] },
  { en: 'view',        ru: ['вид', 'пейзаж'] },
  { en: 'could',       ru: ['мог', 'могла', 'могли'] },
  { en: 'distance',    ru: ['расстояние'] },
  { en: 'for a while', ru: ['некоторое время'] },
  { en: 'thing',       ru: ['вещь', 'предмет'] },
  { en: 'probably',    ru: ['вероятно', 'наверное'] },
  { en: 'decide',      ru: ['решать', 'принять решение'] },
  { en: 'out',         ru: ['наружу', 'снаружи', 'вне'] },
  { en: 'terrible',    ru: ['ужасный', 'страшный'] },
  { en: 'find',        ru: ['находить'] },
  { en: 'angry',       ru: ['сердитый', 'злой'] },
];

// ─── PROGRESS (localStorage + Supabase) ──────────────────────────────────────
let knownMap = {}; // { wordIndex: true/false }

function loadLocal(){
  try { knownMap = JSON.parse(localStorage.getItem(LS_KEY) || '{}'); } catch(e){ knownMap = {}; }
}

function saveLocal(){
  localStorage.setItem(LS_KEY, JSON.stringify(knownMap));
}

// Supabase upsert — POST with merge-duplicates
async function saveToSupabase(){
  const knownWords = WORDS.filter((_,i) => knownMap[i]).map(w => w.en);
  const knownCount = knownWords.length;
  try {
    await fetch(`${SB_URL}/vocab_progress`, {
      method: 'POST',
      headers: {
        'apikey': SB_KEY,
        'Authorization': 'Bearer ' + SB_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({
        student: STUDENT,
        known_count: knownCount,
        known_words: knownWords.join(','),
        updated_at: new Date().toISOString()
      })
    });
  } catch(e){ /* offline — localStorage is enough */ }
}

async function loadFromSupabase(){
  try {
    const r = await fetch(`${SB_URL}/vocab_progress?student=eq.${STUDENT}&select=known_words`, {
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }
    });
    if(!r.ok) return;
    const rows = await r.json();
    if(rows.length && rows[0].known_words){
      const cloudKnown = rows[0].known_words.split(',').map(s=>s.trim());
      WORDS.forEach((w,i)=>{ if(cloudKnown.includes(w.en)) knownMap[i] = true; });
      saveLocal();
      updateStats();
      renderDict();
    }
  } catch(e){}
}

function setKnown(idx, val){
  knownMap[idx] = val;
  saveLocal();
  saveToSupabase();
  updateStats();
  renderDict();
}

function countKnown(){ return Object.values(knownMap).filter(Boolean).length; }

function updateStats(){
  const k = countKnown();
  const pct = Math.round(k / WORDS.length * 100);
  document.getElementById('statKnown').textContent  = k;
  document.getElementById('statPct').textContent    = pct + '%';
  document.getElementById('heroKnown').textContent  = k;
  document.getElementById('heroPct').textContent    = pct + '%';
  // also update index.html counter via localStorage (already in LS_KEY)
}

// ─── DICTIONARY ───────────────────────────────────────────────────────────────
function renderDict(){
  document.getElementById('dictBody').innerHTML = WORDS.map((w,i)=>`
    <tr>
      <td><span class="known-dot${knownMap[i]?' known':''}"></span></td>
      <td><span class="en-word">${w.en}</span></td>
      <td class="ru-word">${w.ru.join(', ')}</td>
    </tr>`).join('');
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(id){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.className = 'tab-btn' + (['dict','cards','quiz'][i]===id ? ' active' : '');
  });
  document.querySelectorAll('.tab-pane').forEach((p,i)=>{
    p.className = 'tab-pane' + (['dict','cards','quiz'][i]===id ? ' active' : '');
  });
  if(id==='cards') initCards();
  if(id==='quiz')  initQuiz();
}

// ─── FLASHCARDS ───────────────────────────────────────────────────────────────
let fcWords=[], fcIdx=0;

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }
function norm(s){ return (s||'').toLowerCase().trim().replace(/[ёе]/g,'е'); }

function initCards(){
  fcWords = shuffle(WORDS.map((w,i)=>({...w, idx:i})));
  fcIdx = 0;
  showCard();
}

function showCard(){
  const cont = document.getElementById('fcContent');
  if(fcIdx >= fcWords.length){
    const k = countKnown();
    cont.innerHTML = `<div class="fc-done">
      <div class="fc-done-emoji">🎉</div>
      <div class="fc-done-title">Все карточки пройдены!</div>
      <div class="fc-done-sub">Знаю: ${k} из ${WORDS.length} слов</div>
      <button class="btn" onclick="initCards()">🔄 Пройти снова</button>
    </div>`;
    return;
  }
  const w = fcWords[fcIdx];
  cont.innerHTML = `
    <div class="fc-counter">${fcIdx+1} / ${fcWords.length}</div>
    <div class="flashcard-wrap" onclick="this.querySelector('.flashcard').classList.toggle('flipped')">
      <div class="flashcard">
        <div class="card-face card-front">
          <div class="card-word">${w.en}</div>
          <div class="card-tap">👆 нажми чтобы увидеть перевод</div>
        </div>
        <div class="card-face card-back">
          <div class="card-trans">${w.ru.join(', ')}</div>
        </div>
      </div>
    </div>
    <div class="fc-btns">
      <button class="fc-btn hard" onclick="markCard(${w.idx},false)">😅 Трудно</button>
      <button class="fc-btn know" onclick="markCard(${w.idx},true)">✅ Знаю!</button>
    </div>`;
}

function markCard(idx, val){
  setKnown(idx, val);
  fcIdx++;
  showCard();
}

// ─── QUIZ ─────────────────────────────────────────────────────────────────────
let qWords=[], qIdx=0, qCorrect=0, qTotal=0, qAnswered=false;

function initQuiz(){
  qWords = shuffle([...WORDS.map((w,i)=>({...w,idx:i}))]);
  qIdx=0; qCorrect=0; qTotal=0; qAnswered=false;
  showQuestion();
}

function showQuestion(){
  const cont = document.getElementById('quizContent');
  if(qIdx >= qWords.length){
    const pct = Math.round(qCorrect/qWords.length*100);
    cont.innerHTML = `<div class="quiz-done">
      <div class="quiz-done-score">${qCorrect}/${qWords.length}</div>
      <div class="quiz-done-msg">${pct>=80?'🎉 Отлично! Слова усвоены!':pct>=50?'👍 Хорошо! Продолжай!':'💪 Повтори карточки и попробуй снова'}</div>
      <button class="btn" onclick="initQuiz()">🔄 Пройти снова</button>
    </div>`;
    return;
  }
  const w = qWords[qIdx];
  const pct = Math.round(qIdx/qWords.length*100);
  qAnswered = false;
  cont.innerHTML = `
    <div class="quiz-counter">${qIdx+1} / ${qWords.length}</div>
    <div class="quiz-pb-bg"><div class="quiz-pb-fill" id="qBar" style="width:${pct}%"></div></div>
    <div class="quiz-word-display">
      <div class="quiz-word">${w.en}</div>
    </div>
    <div class="quiz-score">Счёт: ${qCorrect} / ${qTotal}</div>
    <div class="quiz-input-row">
      <input class="quiz-input" id="qInput" placeholder="Введи перевод..." autocomplete="off"
        onkeydown="if(event.key==='Enter') checkQuiz()"/>
    </div>
    <div class="quiz-result" id="qResult"></div>
    <div class="quiz-btn-row">
      <button class="quiz-btn primary" onclick="checkQuiz()">Проверить</button>
      <button class="quiz-btn secondary" onclick="skipQuiz()">Следующее →</button>
    </div>`;
  setTimeout(()=>{ const inp=document.getElementById('qInput'); if(inp) inp.focus(); }, 50);
}

function checkQuiz(){
  if(qAnswered) return;
  const inp = document.getElementById('qInput');
  if(!inp) return;
  const val = norm(inp.value);
  const w = qWords[qIdx];
  const ok = w.ru.some(r => norm(r)===val || norm(r).includes(val) || val.includes(norm(r.split(',')[0])));
  qAnswered = true;
  qTotal++;
  if(ok){ qCorrect++; setKnown(w.idx, true); }
  else { setKnown(w.idx, false); }
  const res = document.getElementById('qResult');
  if(res){ res.className='quiz-result '+(ok?'ok':'err'); res.textContent = ok ? '✅ Правильно!' : '❌ Правильно: ' + w.ru.join(' / '); }
  inp.disabled = true;
  setTimeout(()=>{ qIdx++; showQuestion(); }, ok ? 800 : 1600);
}

function skipQuiz(){
  qIdx++;
  showQuestion();
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadLocal();
renderDict();
updateStats();
loadFromSupabase(); // sync cloud → local silently
</script>
</body>
</html>
